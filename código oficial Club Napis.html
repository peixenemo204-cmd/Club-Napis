<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Napis</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
height:100vh;
background:radial-gradient(circle at top,#1e1e2f,#0d0d15 70%);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.container{
width:100%;
max-width:420px;
padding:30px;
text-align:center;
}

h1{
font-size:24px;
margin-bottom:15px;
}

.subtitle{
font-size:14px;
opacity:.6;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1f1f2e;
color:white;
text-align:center;
margin-bottom:10px;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#00f5d4,#00bbf9);
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.hidden{display:none;}

.cards{
display:flex;
justify-content:space-between;
margin-top:25px;
}

.card{
width:100px;
height:150px;
border-radius:18px;
perspective:1000px;
cursor:pointer;
}

.card-inner{
width:100%;
height:100%;
transition:transform .8s cubic-bezier(.4,2,.6,1);
transform-style:preserve-3d;
position:relative;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
backface-visibility:hidden;
}

.card-front{
background:linear-gradient(135deg,#2a2a3d,#1b1b29);
border:1px solid rgba(255,255,255,.08);
font-size:28px;
color:#00f5d4;
}

.card-back{
background:linear-gradient(135deg,#00f5d4,#00bbf9);
color:black;
transform:rotateY(180deg);
font-size:18px;
font-weight:bold;
}

.ticket{
margin-top:25px;
padding:20px;
border-radius:20px;
background:linear-gradient(135deg,#ffffff,#e6fefe);
color:#111;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
display:none;
position:relative;
}

.ticket::before,
.ticket::after{
content:"";
position:absolute;
width:20px;
height:20px;
background:#0d0d15;
border-radius:50%;
top:50%;
transform:translateY(-50%);
}

.ticket::before{left:-10px;}
.ticket::after{right:-10px;}

.ticket h2{
font-size:18px;
margin-bottom:10px;
}

.ticket .codigo{
font-size:20px;
font-weight:bold;
letter-spacing:2px;
margin-top:10px;
}

.result{
margin-top:15px;
font-size:14px;
white-space:pre-line;
}
</style>
</head>
<body>

<div class="container">

<!-- TELA 1 -->
<div id="lockScreen">
<h1>CLUB NAPIS</h1>
<div class="subtitle">Compra Inteligente Começa Aqui</div>
<input type="password" id="unlockCode" placeholder="Código da atendente">
<button onclick="unlock()">Desbloquear</button>
</div>

<!-- TELA 2 -->
<div id="gameScreen" class="hidden">

<input type="text" id="codigoInput" placeholder="Consultar código">
<button onclick="consultarCodigo()">Consultar</button>
<div id="consultaResultado" class="result"></div>

<h1>Escolha seu Cartão</h1>

<div class="cards">
<div class="card" onclick="reveal(this)">
<div class="card-inner">
<div class="card-front">✦</div>
<div class="card-back"></div>
</div>
</div>

<div class="card" onclick="reveal(this)">
<div class="card-inner">
<div class="card-front">✦</div>
<div class="card-back"></div>
</div>
</div>

<div class="card" onclick="reveal(this)">
<div class="card-inner">
<div class="card-front">✦</div>
<div class="card-back"></div>
</div>
</div>
</div>

<div id="ticket" class="ticket">
<h2>Benefício Reservado</h2>
<div id="premioTexto"></div>
<div class="codigo" id="codigoGerado"></div>
<div style="margin-top:10px;font-size:13px;">Use na próxima compra</div>
</div>

</div>
</div>

<script>

const validCode = "1234";
let premios = JSON.parse(localStorage.getItem("premios")) || [];

const prizes = [
"🎁 Brinde Exclusivo",
"💰 5% de Desconto",
"🎉 Prêmio Especial",
"❌ Não foi dessa vez"
];

function unlock(){
let code = document.getElementById("unlockCode").value;
if(code === validCode){
document.getElementById("lockScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");
}else{
alert("Código inválido");
}
}

function gerarCodigo(){
const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let codigo;
let existe;

do{
codigo = "NP-";
for(let i=0;i<6;i++){
let randomIndex = crypto.getRandomValues(new Uint32Array(1))[0] % caracteres.length;
codigo += caracteres[randomIndex];
}
existe = premios.some(p => p.codigo === codigo);
}while(existe);

return codigo;
}

function reveal(card){

let pendente = premios.find(p => p.usado === false);
if(pendente){
alert("Existe um prêmio pendente. Utilize antes de jogar novamente.");
return;
}

const randomPrize = prizes[Math.floor(Math.random()*prizes.length)];

card.classList.add("flipped");
card.querySelector(".card-back").innerText="✓";

if(randomPrize === "❌ Não foi dessa vez"){
alert(randomPrize);
return;
}

let codigo = gerarCodigo();

premios.push({
codigo: codigo,
premio: randomPrize,
usado: false
});

localStorage.setItem("premios", JSON.stringify(premios));

document.getElementById("premioTexto").innerText = randomPrize;
document.getElementById("codigoGerado").innerText = codigo;
document.getElementById("ticket").style.display="block";

document.querySelectorAll(".card").forEach(c => c.onclick=null);
}

function consultarCodigo(){
let input = document.getElementById("codigoInput").value.trim();
let premio = premios.find(p => p.codigo === input);

if(!premio){
document.getElementById("consultaResultado").innerText="Código não encontrado.";
return;
}

if(premio.usado){
document.getElementById("consultaResultado").innerText="Este código já foi utilizado.";
return;
}

document.getElementById("consultaResultado").innerText="Premiação: "+premio.premio+" ✓ Código válido.";

premio.usado = true;
localStorage.setItem("premios", JSON.stringify(premios));
}

</script>

</body>
</html>
