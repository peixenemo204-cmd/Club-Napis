<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Napis</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
height:100vh;
background:radial-gradient(circle at top,#1e1e2f,#0d0d15 70%);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:100%;
max-width:420px;
padding:25px;
text-align:center;
}

h1{
font-size:26px;
margin-bottom:10px;
}

.subtitle{
opacity:0.6;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#1f1f2e;
color:white;
text-align:center;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#00f5d4,#00bbf9);
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.hidden{
display:none;
}

.cards{
display:flex;
justify-content:space-between;
margin-top:25px;
}

.card{
width:100px;
height:150px;
border-radius:18px;
perspective:1000px;
cursor:pointer;
}

.card-inner{
width:100%;
height:100%;
transition:transform .8s;
transform-style:preserve-3d;
position:relative;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front,
.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
backface-visibility:hidden;
}

.card-front{
background:#222;
font-size:28px;
}

.card-back{
background:#00f5d4;
color:black;
font-weight:bold;
transform:rotateY(180deg);
}

.ticket{
margin-top:25px;
padding:18px;
background:rgba(255,255,255,0.05);
border-radius:14px;
}

.codigo{
font-size:22px;
letter-spacing:3px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<div id="lockScreen">

<h1>CLUB NAPIS</h1>
<div class="subtitle">Compra Inteligente Começa Aqui</div>

<input type="password" id="unlockCode" placeholder="Código da atendente">

<button onclick="unlock()">Desbloquear</button>

<button onclick="verPremio()">Ver prêmio pendente</button>

<div id="premioPendente"></div>

</div>

<div id="gameScreen" class="hidden">

<h1>Escolha um Cartão</h1>

<div class="cards">

<div class="card" onclick="reveal(this)">
<div class="card-inner">
<div class="card-front">✦</div>
<div class="card-back">✓</div>
</div>
</div>

<div class="card" onclick="reveal(this)">
<div class="card-inner">
<div class="card-front">✦</div>
<div class="card-back">✓</div>
</div>
</div>

<div class="card" onclick="reveal(this)">
<div class="card-inner">
<div class="card-front">✦</div>
<div class="card-back">✓</div>
</div>
</div>

</div>

<div id="ticket" class="ticket hidden">

<h2>🎁 Prêmio Revelado</h2>

<div id="premioNome"></div>

<div class="codigo" id="codigoPremio"></div>

<p style="opacity:.7;margin-top:10px">
Guarde este código para resgatar na próxima compra
</p>

</div>

<h3 style="margin-top:30px">Resgatar prêmio</h3>

<input id="codigoResgate" placeholder="Digite o código do cliente">

<button onclick="resgatar()">Resgatar prêmio</button>

<div id="resultadoResgate"></div>

</div>

<div id="adminScreen" class="hidden">

<h1>Painel Admin</h1>

<div id="dadosStorage"></div>

<button onclick="carregarStorage()">Atualizar dados</button>

<button onclick="limparStorage()">Apagar todos os dados</button>

<button onclick="voltar()">Voltar</button>

</div>

</div>

<script>

const validCode="1234"

function unlock(){

let codigo=document.getElementById("unlockCode").value

if(codigo==="Alair"){

document.getElementById("lockScreen").classList.add("hidden")
document.getElementById("adminScreen").classList.remove("hidden")

carregarStorage()

return

}

if(codigo===validCode){

document.getElementById("lockScreen").classList.add("hidden")
document.getElementById("gameScreen").classList.remove("hidden")

}else{

alert("Código inválido")

}

}

function gerarCodigo(){

const caracteres="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

let codigo=""

for(let i=0;i<6;i++){

codigo+=caracteres.charAt(Math.floor(Math.random()*caracteres.length))

}

return codigo

}

function reveal(card){

if(localStorage.getItem("codigoPremio")){

alert("Você já possui prêmio pendente!")

return

}

const premios=[
"🎁 Brinde Exclusivo",
"💰 5% de Desconto",
"🥤 Refrigerante Grátis",
"❌ Não foi dessa vez"
]

const premio=premios[Math.floor(Math.random()*premios.length)]

card.classList.add("flipped")

document.querySelectorAll(".card").forEach(c=>c.onclick=null)

if(premio!=="❌ Não foi dessa vez"){

let codigo=gerarCodigo()

localStorage.setItem("codigoPremio",codigo)
localStorage.setItem("premioNome",premio)

document.getElementById("premioNome").innerText=premio
document.getElementById("codigoPremio").innerText=codigo

document.getElementById("ticket").classList.remove("hidden")

}else{

alert("Não foi dessa vez 😢")

}

}

function verPremio(){

let codigo=localStorage.getItem("codigoPremio")
let premio=localStorage.getItem("premioNome")

if(codigo){

document.getElementById("premioPendente").innerHTML=

"🎁 Prêmio pendente<br><br>"+
premio+"<br>Código: "+codigo

}else{

document.getElementById("premioPendente").innerHTML=
"Você não possui prêmio pendente."

}

}

function resgatar(){

let codigoDigitado=document.getElementById("codigoResgate").value
let codigoSalvo=localStorage.getItem("codigoPremio")
let premio=localStorage.getItem("premioNome")

if(!codigoSalvo){

document.getElementById("resultadoResgate").innerText="Nenhum prêmio encontrado"

return

}

if(codigoDigitado===codigoSalvo){

document.getElementById("resultadoResgate").innerText=
"✅ Prêmio resgatado: "+premio

localStorage.removeItem("codigoPremio")
localStorage.removeItem("premioNome")

}else{

document.getElementById("resultadoResgate").innerText="❌ Código inválido"

}

}

function carregarStorage(){

let area=document.getElementById("dadosStorage")

area.innerHTML=""

if(localStorage.length===0){

area.innerHTML="Nenhum dado salvo."

return

}

for(let i=0;i<localStorage.length;i++){

let chave=localStorage.key(i)
let valor=localStorage.getItem(chave)

area.innerHTML+=chave+" : "+valor+"<br><br>"

}

}

function limparStorage(){

localStorage.clear()

alert("Dados apagados")

carregarStorage()

}

function voltar(){

location.reload()

}

</script>

</body>
</html>
